apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: pra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: pra/flask-sqlite:1.2
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_PATH
              value: /data/app.db
          ports:
            - containerPort: 8080
          command: ["/bin/sh","-lc"]
          args:
            - |
              cd /opt/app && gunicorn -w 2 -b 0.0.0.0:8080 app:app
          volumeMounts:
            - name: data
              mountPath: /data
            - name: backup         # <--- AJOUT : montage pour voir les backups
              mountPath: /backup    # <--- AJOUT : chemin utilisé dans ton app.py
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pra-data
        - name: backup           # <--- AJOUT : lien vers le PVC de sauvegarde
          persistentVolumeClaim:
            claimName: pra-backup # <--- AJOUT : nom du PVC défini dans l'atelier